    body: `<blockquote><p>So when the people set out from their tents to pass over the Jordan with the priests bearing the ark of the covenant before the people&hellip; the waters coming down from above stood and rose up in a heap very far away&hellip; (Joshua 3:14&ndash;17, ESV)</p></blockquote>
<h2>The God Who Splits Seas</h2>
<p>What is Joshua 3:14&ndash;17 preaching to its first audience? <em>Yahweh has proven to you that He is with you and will be faithful to keep all of his promises to you. So go forward trusting Him as you take the land He has given you.</em></p>
<p>God sets up this event as a test for Himself. He calls His shot beforehand to give the people a sure sign of His presence. The Jordan piling up can only be the result of God's intervention. They should have confidence that no battle will be too hard for the God who splits seas and stops rivers.</p>
<h2>A Greater Sign</h2>
<p>Believers today are recipients of signs even greater than the Jordan's waters heaping up. We have the whole canon of Scripture testifying to the greatest demonstration of God's commitment to dwell with his people: Golgotha. Upon the cross Christ demonstrated to us once and for all that God is with His people and will keep his promise to take us to the heavenly city one day.</p>
<p>The theological message of this passage reads very similarly to Romans 8:32. <em>God, who did not spare his own Son but gave him up for us all, will graciously give us all things&mdash;including entrance to the land of the new earth.</em></p>
<h2>Application</h2>
<p>Brothers and sisters, the God who splits seas and stops rivers bore the splinters of the cross until His heart stopped so that our holy God could dwell with us a forgiven people. God's power on behalf of His people should fill us with confidence to sing, <em>"What then shall we say to these things? If God is for us, who can be against us?" (Romans 8:31)</em></p>`

    body: `<p>A close reading of Dickens&rsquo; classic reveals a thoroughly Christian story&mdash;not merely a sentimental tale about generosity.</p>
<h2>Christmas</h2>
<p>Why does Dickens choose to write a story about "keeping Christmas" to transform Scrooge on? He attaches the cheer to the true meaning of Christmas in Christ: <em>"I am sure I have always thought of Christmas time, when it has come round&mdash;apart from the veneration due to its sacred name and origin, if anything belonging to it can be apart from that&mdash;as a good time; a kind, forgiving, charitable, pleasant time."</em></p>
<h2>The Names</h2>
<p><strong>Ebenezer Scrooge.</strong> Ebenezer is "stone of help" from 1 Samuel 7:12. Scrooge is likely from "scruple," slang for a stingy person. <strong>Cratchets</strong> likely comes from "cratche," a Middle English word for "a cross or frame of timber." <strong>Jacob Marley</strong> likely comes from <em>marl</em>, an old term for "earth" or "soil." Perhaps this is why Dickens chooses the Biblical name "Jacob," who saw a way for angels to pass to and from the earth.</p>
<h2>Biblical Allusions</h2>
<p>Dickens weaves Scripture into the story at key moments: "No eye at all is better than an evil eye" (Matthew 5:29), Marley's transparent body alluding to 1 John 3:17, the Ghost of Christmas Present's exchange about the Sabbath (Mark 2:23&ndash;28), Scrooge resolving to "treasure up every word" (Luke 2:19), and "he took a child, and set him in the midst of them" (Mark 9:36).</p>
<h2>The Theme</h2>
<p>The theme of the book is desiring mercy instead of sacrifice&mdash;loving God by loving neighbor. Marley's ghost says, <em>"Mankind was my business. The common welfare was my business; charity, mercy, forbearance, and benevolence, were, all, my business."</em></p>
<h2>Scrooge's Journey</h2>
<p>The book follows a clear arc of repentance and faith. Stave 1: Scrooge starts an unbelieving sinner. Stave 2: He softens but does not repent. Stave 3: Scrooge repents of his sin. Stave 4: When confronted with death, he falls to his knees. Stave 5: Scrooge awakens a changed man and goes to church. The bells that ring out are celebrating his salvation.</p>`

  {
    date: 'April 5, 2026', type: 'Sermon', title: 'Jesus is King of Everything &mdash; Psalm 2 (Easter)',
    toc: ['Why Preach Psalm 2 on Easter?', 'The Rulers Attack', 'The Father Laughs', 'The Resurrection Declares Him King', 'Serve and Take Refuge'],
    body: `<p>Christ is Risen! He is risen indeed! That is the best news. Jesus Christ, the incarnate Son of God, suffered and died for the sins of his people. Three days later, he rose to life again. He ascended to the right hand of the Father, where he rules. Christ is King. Psalm 2 is all about this best of news.</p>
<h2>Why Preach Psalm 2 on Easter?</h2>
<p>Psalm 2 tells the story of Easter. Pilate and Herod and the Jewish rulers raged and plotted against the LORD and against his anointed (Acts 4:23-26). They did not want to submit to his reign. But God had the last laugh. At the resurrection, God declared that Jesus was his Son (Rom 1:6) and gave him all authority in heaven and on earth (Matt 28:18).</p>
<p>Now we all have two choices: repent, kiss the Son, and take refuge in him. Or continue to rage and be irreversibly broken.</p>
<h2>The Rulers Attack (vv. 1-3)</h2>
<p>The early church quotes Psalm 2 and applies it directly to Herod, Pontius Pilate, the Gentiles, and Israel who gathered against Jesus. Hundreds of years before Jesus was born, God through David wrote Psalm 2 about this very moment. The nations raged. They plotted. And they failed. The Anointed One they killed did not stay dead.</p>
<h2>The Father Laughs (vv. 4-6)</h2>
<p>God laughs at the rulers who crucified Jesus. Not a funny ha-ha laugh. The laugh of a general whose trap worked perfectly. As Jesus dies, his enemies mock him. But all the while God laughs. They walk right into God's trap. Colossians 2:15 says Jesus put the cosmic forces of evil to open shame.</p>
<p>If God can turn the murder of his Son into the salvation of the world, he can turn every evil you have ever experienced into your everlasting joy. Easter is the ultimate poke in the eye to every evil.</p>
<h2>The Resurrection Declares Him King (vv. 7-9)</h2>
<p>"You are my Son, today I have begotten you." Paul tells us in Acts 13 that "today" means the day God raised Jesus from the dead. The resurrection was Jesus' coronation. Romans 1:4 says Jesus was "declared to be the Son of God in power by his resurrection." We are not celebrating the day Jesus narrowly escaped death. We are celebrating the day Jesus was crowned king of the world and received all power to rule.</p>
<h2>Serve and Take Refuge (vv. 10-12)</h2>
<p>"Blessed are all those who take refuge in him." This is astonishingly good news. The fate of sinners is not sealed. There is hope for everyone who will submit, who will throw down their weapons, who will confess and repent. In Acts 13, after quoting Psalm 2, Paul says forgiveness of sins is proclaimed through Jesus. Come, take refuge in him. He is the King of everything.</p>`

const timeline = document.getElementById('timeline');

data.forEach((item, index) => {
  const entry = document.createElement('div');
  entry.className = 'entry';

  const header = document.createElement('div');
  header.className = 'entry-header';

  const dateSpan = document.createElement('span');
  dateSpan.className = 'entry-date';
  dateSpan.textContent = item.date;

  const typeSpan = document.createElement('span');
  typeSpan.className = 'entry-type';
  typeSpan.textContent = item.type;

  const titleSpan = document.createElement('span');
  titleSpan.className = 'entry-title';
  titleSpan.innerHTML = item.title;

  const expandSpan = document.createElement('span');
  expandSpan.className = 'entry-expand';
  expandSpan.textContent = '+';

  header.appendChild(dateSpan);
  header.appendChild(typeSpan);
  header.appendChild(titleSpan);
  header.appendChild(expandSpan);

  const bodyDiv = document.createElement('div');
  bodyDiv.className = 'entry-body';

  const content = document.createElement('div');
  content.className = 'entry-content';

  if (item.toc) {
    const toc = document.createElement('div');
    toc.className = 'entry-toc';
    toc.innerHTML = '<strong>Contents</strong><ol>' +
      item.toc.map(t => '<li><a href="#' + t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '') + '">' + t + '</a></li>').join('') +
      '</ol>';
    content.appendChild(toc);
  }

  const bodyContent = document.createElement('div');
  bodyContent.innerHTML = item.body;
  content.appendChild(bodyContent);

  bodyDiv.appendChild(content);
  entry.appendChild(header);
  entry.appendChild(bodyDiv);

  header.addEventListener('click', () => {
    entry.classList.toggle('open');
    expandSpan.textContent = entry.classList.contains('open') ? '\u00d7' : '+';
  });

  timeline.appendChild(entry);
});
</script>
</body>
